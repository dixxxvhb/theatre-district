<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theatre District</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0a0d18; color: #d4a574;
        font-family: Georgia, "Times New Roman", serif; text-align: center;
      }
      h1 { font-size: 3rem; letter-spacing: 0.18em; margin: 0 0 0.25rem; text-shadow: 0 0 40px rgba(212,165,116,0.25); }
      h2 { font-size: 1.4rem; letter-spacing: 0.3em; color: #b8860b; font-weight: normal; margin: 0 0 2rem; }
      p { color: #8a8fa3; font-size: 0.95rem; letter-spacing: 0.08em; }
      a { color: #d4a574; text-decoration: none; border-bottom: 1px solid rgba(212,165,116,0.4); padding-bottom: 1px; }
      a:hover { color: #f0d9b8; border-color: #f0d9b8; }
      .rule { height: 1px; width: 16rem; margin: 1.5rem auto; background: linear-gradient(to right, transparent, #d4a574, transparent); }
    </style>
  </head>
  <body>
    <main>
      <h1>THEATRE</h1>
      <h2>DISTRICT</h2>
      <p>The street is under construction.</p>
      <div class="rule"></div>
      <p>Meanwhile: <a href="./classic/">Broadway Tycoon (classic)</a></p>
    </main>
  </body>
</html>
